name: monitoring-stack

networks:
  monitor-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitor-net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"   # lets you POST /-/reload after editing prometheus.yml itself
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitor-net
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}   # change this (or use GF_SECURITY_ADMIN_PASSWORD__FILE for a secret)
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3000:3000"

  # --- First monitored item: the Duolingo tracker exporter ---
  # This compose file lives at monitoring/docker-compose.yml inside the repo, so the
  # build context is the repo root (one level up), where dockerfile/adam.py already live.
  duolingo-exporter:
    build:
      context: ..
      dockerfile: dockerfile
    container_name: duolingo-exporter
    restart: unless-stopped
    networks:
      - monitor-net
    environment:
      - DUO_JWT=${DUO_JWT}
    ports:
      - "8010:8000"   # optional, only needed if you want to browse the raw metrics from the host
